{% import "macros/ui.html" as ui %}
<section class="gallery" id="gallery" data-section="gallery">
  <div class="container">
    {{ ui.section_header(content.gallery.section.eyebrow, content.gallery.section.title, content.gallery.section.subtitle) }}

    <div class="gallery__filters" data-reveal>
      {% for f in content.gallery.filters %}
      <button class="gallery__filter-btn {{ 'is-active' if loop.first else '' }}" data-filter="{{ f }}">{{ f }}</button>
      {% endfor %}
    </div>

    <div class="gallery__grid" id="galleryGrid">
      {% for item in content.gallery.photos %}
      <figure class="gallery__item gallery__item--{{ item.size }}" data-category="{{ item.category }}" data-reveal
              data-lightbox-title="{{ item.title }}" data-lightbox-category="{{ item.category }}" data-lightbox-swatch="{{ item.swatch }}">
        <div class="swatch swatch--{{ item.swatch % 12 + 1 }}"><div class="swatch__sheen"></div></div>
        <figcaption>
          <span class="gallery__item-cat">{{ item.category }}</span>
          <span class="gallery__item-title">{{ item.title }}</span>
          <span class="gallery__item-zoom"><i class="fa-solid fa-expand"></i></span>
        </figcaption>
      </figure>
      {% endfor %}
    </div>
  </div>
</section>

<div class="lightbox" id="lightbox">
  <button class="lightbox__close" id="lightboxClose" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
  <button class="lightbox__nav lightbox__nav--prev" id="lightboxPrev" aria-label="Previous"><i class="fa-solid fa-chevron-left"></i></button>
  <div class="lightbox__stage">
    <div class="swatch lightbox__swatch" id="lightboxSwatch"><div class="swatch__sheen"></div></div>
    <div class="lightbox__info">
      <span id="lightboxCategory"></span>
      <h3 id="lightboxTitle"></h3>
    </div>
  </div>
  <button class="lightbox__nav lightbox__nav--next" id="lightboxNext" aria-label="Next"><i class="fa-solid fa-chevron-right"></i></button>
</div>
